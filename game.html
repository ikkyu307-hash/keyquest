<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เล่นเกม — คีย์เควสต์</title>
  <meta name="description" content="ฝึกพิมพ์ดีดภาษาไทยและอังกฤษกับโจทย์สุ่มใหม่ทุกครั้ง — เลือก 4 ระดับความยาก">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/game.css">
    <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="js/config.js"></script>
  <script src="js/icons.js"></script>
</head>
<body>


<!-- FX layers -->
<div id="burst"></div>
<div id="fx"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><img class="logo-img" src="logo.png" alt="คีย์เควสต์ Logo"></div>
      <div>
        <h1>คีย์<span>เควสต์</span></h1>
        <p>เกมฝึกพิมพ์ดีด · ไทย & อังกฤษ · สุ่มโจทย์ใหม่ทุกครั้ง</p>
      </div>
    </div>
    <div class="head-right">
      <button class="icon-btn" id="btnFullscreen" title="เต็มจอ"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M4 4h6v2H6v4H4V4zm14 0h-6v2h4v4h2V4zM4 20h6v-2H6v-4H4v6zm14 0h-6v-2h4v-4h2v6z" fill="currentColor"/></svg></button>
      <button class="icon-btn" id="btnSound" title="เปิด/ปิดเสียงพิมพ์"><svg class="ic"><use href="#i-vol"></use></svg></button>
      <button class="icon-btn" id="btnMusic" title="เปิด/ปิดเพลงประกอบ"><svg class="ic"><use href="#i-music"></use></svg></button>
      <div class="lang-toggle">
        <button id="btnTH" class="active"><svg class="ic"><use href="#i-globe"></use></svg> ไทย</button>
        <button id="btnEN"><svg class="ic"><use href="#i-globe"></use></svg> EN</button>
      </div>
    </div>
  </header>

  <!-- PROFILE BAR ROW -->
  <div class="profile-row" id="profileRow">
    <div class="profile-bar" id="profileBar">
      <div class="avatar" id="headerAvatar">🦊</div>
      <div class="profile-info">
        <div class="profile-user" id="profileUser">Guest</div>
        <span class="profile-lvl" id="profileLvl">Lv. 1</span>
      </div>
      <div class="profile-stats">
        <div class="profile-xp"><div class="profile-xp-bar" id="profileXpBar"></div></div>
        <div class="profile-gold"><svg class="ic"><use href="#i-star"></use></svg> <span id="profileGold">0</span></div>
      </div>
      <button class="btn-logout" id="btnLogout" title="Logout"><svg class="ic"><use href="#i-logout"></use></svg></button>
    </div>
  </div>

  <!-- ===== MENU SCREEN ===== -->
  <section class="screen" id="menu">
    <div class="menu-logo-banner">
      <img src="logo.png" alt="คีย์เควสต์" class="menu-logo-img">
    </div>
    <div class="menu-head">
      <h2 id="menuTitle">เลือกระดับความยาก</h2>
      <p id="menuHint"><svg class="ic"><use href="#i-bolt"></use></svg> ทุกระดับสุ่มโจทย์ใหม่ทุกครั้งที่เล่น</p>
    </div>
    <div class="diffs" id="diffGrid"></div>
    <div class="menu-nav-hint" id="menuNavHint">
      <kbd>←</kbd><kbd>→</kbd> เลือกด่าน &nbsp; <kbd>Enter</kbd> เริ่มเกม
    </div>
    <div class="controls" style="margin-top:28px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-ghost" id="btnGoAcademy"><svg class="ic"><use href="#i-bolt"></use></svg> <span id="lblAcademy">สำนักฝึกวิชา</span></button>
      <button class="btn btn-ghost" id="btnGoTutorial"><svg class="ic"><use href="#i-hand"></use></svg> <span id="lblTutorial">ฝึกวางนิ้ว</span></button>
      <button class="btn btn-ghost" id="btnGoQuests"><svg class="ic"><use href="#i-medal"></use></svg> <span id="lblQuests">ภารกิจ & อันดับ</span></button>
    </div>
  </section>

  <!-- COUNTDOWN OVERLAY -->
  <div class="countdown-overlay" id="countdownOverlay" style="display:none">
    <div class="countdown-number" id="countdownNumber">3</div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <section class="screen" id="game">
    <div class="bar">
      <div class="stat has-tip" id="sTime" data-tip-th="เวลาที่ใช้ตั้งแต่เริ่มพิมพ์ตัวแรก" data-tip-en="Time elapsed since first keystroke"><div class="k"><svg class="ic"><use href="#i-clock"></use></svg> เวลา</div><div class="v">0.0<small>s</small></div></div>
      <div class="stat has-tip" id="sWpm" data-tip-th="Words Per Minute — จำนวนคำต่อนาที (1 คำ = 5 ตัวอักษร) ยิ่งสูงยิ่งพิมพ์เร็ว" data-tip-en="Words Per Minute — typing speed (1 word = 5 chars). Higher is faster"><div class="k"><svg class="ic"><use href="#i-gauge"></use></svg> WPM</div><div class="v">0</div></div>
      <div class="stat has-tip" id="sAcc" data-tip-th="ความแม่นยำ — สัดส่วนตัวอักษรที่พิมพ์ถูกต่อทั้งหมด (%)" data-tip-en="Accuracy — ratio of correct keystrokes to total (%)" ><div class="k"><svg class="ic"><use href="#i-target"></use></svg> แม่นยำ</div><div class="v">100<small>%</small></div></div>
      <div class="stat has-tip" id="sCombo" data-tip-th="คอมโบ — จำนวนตัวอักษรที่พิมพ์ถูกต่อเนื่องโดยไม่ผิดเลย" data-tip-en="Combo — consecutive correct keystrokes without any mistake"><div class="k"><svg class="ic"><use href="#i-flame"></use></svg> คอมโบ</div><div class="v">0</div></div>
    </div>
    <!-- RPG Monster Stage -->
    <div class="monster-stage" id="monsterStage">
      <div class="monster-hud">
        <span class="monster-lvl-badge" id="monsterLvlBadge">Lv. 1</span>
        <div class="monster-name" id="monsterName">-</div>
        <div class="monster-hp-container">
          <div class="monster-hp-bar">
            <div class="monster-hp-fill" id="monsterHpFill" style="width: 100%;"></div>
          </div>
          <div class="monster-hp-text" id="monsterHpText">100%</div>
        </div>
      </div>
      <div class="stage-monster m-slime" id="monsterSlime"></div>
      <div class="stage-monster m-goblin" id="monsterGoblin"></div>
      <div class="stage-monster m-dragon" id="monsterDragon"></div>
    </div>

    <div class="prog"><span id="progBar"></span></div>
    <div class="type-card">
      <span class="lvl-label" id="lvlLabel">ง่าย</span>
      <div id="textBox"></div>
      <div class="hint" id="liveHint"><svg class="ic"><use href="#i-bulb"></use></svg> สลับแป้นด้วย Ctrl+Space</div>
    </div>
    <div id="keyboard" class="kb"></div>
    <div class="controls">
      <button class="btn btn-ghost" id="btnBack"><svg class="ic"><use href="#i-back"></use></svg> กลับ</button>
    </div>
  </section>

  <!-- ===== RESULT SCREEN ===== -->
  <section class="screen" id="result">
    <div class="result-card">
      <div class="stars" id="rStars"></div>
      <h2 id="rTitle">ทำได้ดี!</h2>
      <div class="result-sub" id="rSub"></div>
      <div class="res-grid">
        <div class="cell has-tip" data-tip-th="Words Per Minute — จำนวนคำต่อนาที ยิ่งสูงยิ่งเร็ว (1 คำ = 5 ตัวอักษร)" data-tip-en="Words Per Minute — higher is faster (1 word = 5 characters)"><div class="v" id="rWpm">0</div><div class="k"><svg class="ic"><use href="#i-gauge"></use></svg> WPM</div></div>
        <div class="cell has-tip" data-tip-th="ความแม่นยำ — เปอร์เซ็นต์ที่พิมพ์ถูก ยิ่งสูงยิ่งแม่น" data-tip-en="Accuracy — percentage of correct keystrokes"><div class="v" id="rAcc">0%</div><div class="k"><svg class="ic"><use href="#i-target"></use></svg> แม่นยำ</div></div>
        <div class="cell has-tip" data-tip-th="เวลาทั้งหมดที่ใช้พิมพ์จนจบ" data-tip-en="Total time to complete typing"><div class="v" id="rTime">0s</div><div class="k"><svg class="ic"><use href="#i-clock"></use></svg> เวลา</div></div>
        <div class="cell has-tip" data-tip-th="คะแนนรวม — คิดจากความเร็ว + ความแม่นยำ + คอมโบ" data-tip-en="Total score — based on speed + accuracy + combo"><div class="v" id="rScore">0</div><div class="k"><svg class="ic"><use href="#i-star"></use></svg> คะแนน</div></div>
      </div>
      <div id="detailedResult"></div>
      <div class="controls">
        <button class="btn btn-ghost" id="btnMenu"><svg class="ic"><use href="#i-back"></use></svg> เมนู</button>
                <button class="btn btn-line" id="btnShareLine" style="display:none; background:#06C755; color:#fff; border:none; box-shadow: 0 4px 12px rgba(6, 199, 85, 0.3); align-items:center; justify-content:center; gap:6px;">
          <svg class="ic" style="fill: currentColor; stroke: none; width: 16px; height: 16px;" viewBox="0 0 24 24"><path d="M24 10.3c0-5.7-5.4-10.3-12-10.3S0 4.6 0 10.3c0 5.1 4.3 9.4 10.1 10.1.4.1.9.3 1.1.8l.2 1.9c.1.7.5.9.9.5l1.9-2.3c2.3-1.6 3.8-3.9 4.8-6.4 3.1-.3 5-2.2 5-4.6zm-14.7 2.3c0 .4-.3.7-.7.7H5.9c-.4 0-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v4.5h2.1c.3.1.6.3.6.7zm2.7 0c0 .4-.3.7-.7.7s-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v5.2zm4.3 0c0 .4-.3.7-.7.7h-2.1c-.4 0-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v4.5h1.4c.4 0 .7.3.7.7zm3.7-2.6c0 .4-.3.7-.7.7h-1.4v1.2c0 .4-.3.7-.7.7s-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7h2.1c.4 0 .7.3.7.7s-.3.7-.7.7h-1.4v1.2h1.4c.4 0 .7.3.7.7z"/></svg>
          <span id="lblShareLine">แชร์ไปยัง LINE</span>
        </button>
        <button class="btn btn-amber" id="btnRetry"><svg class="ic"><use href="#i-refresh"></use></svg> เล่นอีก</button>
        <button class="btn btn-ghost" id="btnNext"><svg class="ic"><use href="#i-next"></use></svg> ด่านต่อไป</button>
      </div>
    </div>
  </section>

  <div class="footer-note" id="footerNote"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/quests.js"></script>
<script src="js/game.js"></script>
<script>bootGame();</script>
</body>
</html>
