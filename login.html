<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — คีย์เควสต์</title>
  <meta name="description" content="เข้าสู่ระบบเพื่อบันทึกสถิติและปลดล็อกทักษะพิเศษ — เกมฝึกพิมพ์ดีดไทย & อังกฤษ">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="js/config.js"></script>
  <script src="js/icons.js"></script>
</head>
<body>


<!-- FALLING BACKGROUND -->
<div class="auth-falling-bg" id="authFallingBg"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg class="logo-svg" viewBox="0 0 128 128"><use href="#i-logo"></use></svg></div>
      <div>
        <h1>คีย์<span>เควสต์</span></h1>
        <p>เกมฝึกพิมพ์ดีด · ไทย & อังกฤษ · สุ่มโจทย์ใหม่ทุกครั้ง</p>
      </div>
    </div>
    <div class="head-right">
      <button class="icon-btn" id="btnSound" title="เปิด/ปิดเสียงพิมพ์"><svg class="ic"><use href="#i-vol"></use></svg></button>
      <button class="icon-btn" id="btnMusic" title="เปิด/ปิดเพลงประกอบ"><svg class="ic"><use href="#i-music"></use></svg></button>
      <div class="lang-toggle">
        <button id="btnTH" class="active"><svg class="ic"><use href="#i-globe"></use></svg> ไทย</button>
        <button id="btnEN"><svg class="ic"><use href="#i-globe"></use></svg> EN</button>
      </div>
    </div>
  </header>

  <!-- AUTH CARD -->
  <div class="auth-card">
    <h2 id="authTitle">เข้าสู่ระบบคีย์เควสต์</h2>
    <p id="authSubtitle">กรุณาเข้าสู่ระบบเพื่อบันทึกระดับเลเวล ทองสะสม และแข่งขันออนไลน์กับเพื่อนๆ</p>

    <!-- Email/Password Form -->
    <form id="authForm" onsubmit="event.preventDefault()">
      <div class="form-group">
        <label id="lblEmail">
          <svg class="ic" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px"><use href="#i-mail"></use></svg>
          อีเมล (Email)
        </label>
        <input type="email" class="form-input" id="authEmail" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label id="lblPassword">
          <svg class="ic" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px"><use href="#i-lock"></use></svg>
          รหัสผ่าน (Password)
        </label>
        <div class="password-wrapper">
          <input type="password" class="form-input" id="authPassword" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" id="btnTogglePassword" tabindex="-1" title="แสดง/ซ่อนรหัสผ่าน">
            <svg class="ic"><use href="#i-eye"></use></svg>
          </button>
        </div>
      </div>
      <div class="auth-err" id="authError"></div>
      <div class="auth-btn-group">
        <button type="submit" class="btn btn-amber" id="btnSubmitAuth">
          <svg class="ic" style="width:16px;height:16px"><use href="#i-lock"></use></svg>
          เข้าสู่ระบบ
        </button>
      </div>
    </form>

    <!-- Divider -->
    <div class="auth-divider" id="authDivider">
      <span>หรือ</span>
    </div>

    <!-- LINE Login -->
    <div class="auth-btn-group">
      <button class="btn btn-line" type="button" id="btnLineAuth">
        <svg class="ic" style="fill: currentColor; stroke: none; width: 20px; height: 20px;" viewBox="0 0 24 24"><path d="M24 10.3c0-5.7-5.4-10.3-12-10.3S0 4.6 0 10.3c0 5.1 4.3 9.4 10.1 10.1.4.1.9.3 1.1.8l.2 1.9c.1.7.5.9.9.5l1.9-2.3c2.3-1.6 3.8-3.9 4.8-6.4 3.1-.3 5-2.2 5-4.6zm-14.7 2.3c0 .4-.3.7-.7.7H5.9c-.4 0-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v4.5h2.1c.3.1.6.3.6.7zm2.7 0c0 .4-.3.7-.7.7s-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v5.2zm4.3 0c0 .4-.3.7-.7.7h-2.1c-.4 0-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7s.7.3.7.7v4.5h1.4c.4 0 .7.3.7.7zm3.7-2.6c0 .4-.3.7-.7.7h-1.4v1.2c0 .4-.3.7-.7.7s-.7-.3-.7-.7v-5.2c0-.4.3-.7.7-.7h2.1c.4 0 .7.3.7.7s-.3.7-.7.7h-1.4v1.2h1.4c.4 0 .7.3.7.7z"/></svg>
        เข้าสู่ระบบด้วย LINE
      </button>
    </div>

    <!-- Guest Button -->
    <div class="auth-btn-group" style="margin-top:8px">
      <button type="button" class="btn btn-ghost" id="btnGuestAuth">
        <svg class="ic" style="width:16px;height:16px"><use href="#i-user"></use></svg>
        เล่นแบบไม่ลงทะเบียน (Guest)
      </button>
    </div>

    <!-- Link to Register -->
    <div class="auth-link" id="authLink">
      ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
    </div>
  </div>

  <div class="footer-note" id="footerNote"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/auth.js"></script>
<script>bootAuth('login');</script>
</body>
</html>
