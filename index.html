<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คีย์เควสต์ — เกมฝึกพิมพ์ดีดไทย & อังกฤษ</title>
  <meta name="description" content="ฝึกพิมพ์ดีดภาษาไทยและอังกฤษ สุ่มโจทย์ใหม่ทุกครั้ง พร้อมระบบ XP ทอง และทักษะพิเศษ">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    body{margin:0;background:#16131f;color:#f4ecdc;display:flex;align-items:center;justify-content:center;height:100vh;
      font-family:"IBM Plex Sans Thai",sans-serif}
    .loader{text-align:center}
    .loader .spinner{width:40px;height:40px;border:4px solid #2c2742;border-top-color:#ffb43d;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div>กำลังโหลด...</div>
  </div>
  <script>
    (async function() {
      await initSupabase();
      
      // Check for active session
      if (dbClient) {
        try {
          const { data: { session } } = await dbClient.auth.getSession();
          if (session && session.user) {
            window.location.replace('profile.html');
            return;
          }
        } catch (e) {
          console.error('Session check failed:', e);
        }
      }
      
      // No session, go to login
      window.location.replace('login.html');
    })();
  </script>
</body>
</html>
