<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ — คีย์เควสต์</title>
  <meta name="description" content="ดูสถิติ ระดับ และจัดการโปรไฟล์ของคุณ — เกมฝึกพิมพ์ดีดไทย & อังกฤษ">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/profile.css">
  <script src="js/config.js"></script>
</head>
<body>

<!-- ICON SPRITE SHEET -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-kb" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h.01M14 12h.01M18 12h.01M7 16h10"/></symbol>
  <symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20"/></symbol>
  <symbol id="i-vol" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></symbol>
  <symbol id="i-mute" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="m22 9-6 6M16 9l6 6"/></symbol>
  <symbol id="i-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
  <symbol id="i-music-off" viewBox="0 0 24 24"><path d="M9 18V5l12-2v6"/><circle cx="6" cy="18" r="3"/><path d="m2 3 20 20"/></symbol>
  <symbol id="i-bolt" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/></symbol>
  <symbol id="i-leaf" viewBox="0 0 24 24"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/></symbol>
  <symbol id="i-gauge" viewBox="0 0 24 24"><path d="m12 14 4-4M3.34 19a10 10 0 1 1 17.32 0"/></symbol>
  <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
  <symbol id="i-star" viewBox="0 0 24 24"><polygon points="12 2 15.1 8.3 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 8.9 8.3 12 2"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></symbol>
  <symbol id="i-next" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
  <symbol id="i-win" viewBox="0 0 24 24"><path d="M3 5.5 10.5 4.4v7.1H3zM10.5 4.2 21 2.7v8.8h-10.5zM3 12.5h7.5v7.1L3 18.5zM10.5 12.5H21v8.8l-10.5-1.5z" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-apple" viewBox="0 0 24 24"><path d="M17.5 12.5c0-2.4 2-3.5 2.1-3.6-1.1-1.7-2.9-1.9-3.5-1.9-1.5-.2-2.9.9-3.6.9s-1.9-.9-3.1-.8c-1.6 0-3.1.9-3.9 2.4-1.7 2.9-.4 7.2 1.2 9.5.8 1.1 1.7 2.4 3 2.3 1.2 0 1.6-.8 3.1-.8s1.8.8 3.1.8 2.1-1.1 2.9-2.2c.9-1.3 1.3-2.6 1.3-2.6s-2.5-1-2.6-3.7zM15 5.2c.7-.8 1.1-1.9 1-3-1 0-2.1.7-2.8 1.5-.6.7-1.1 1.8-1 2.9 1.1.1 2.2-.6 2.8-1.4z" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-linux" viewBox="0 0 24 24"><path d="M9 4.5c0-1.4.9-2.5 3-2.5s3 1.1 3 2.5c0 1.8 1.3 2.9 1.3 5.5 0 1.5-.6 2.6-.3 3.8.3 1.4 1.9 2.6 1.9 4.2 0 1.5-1.2 2.5-3 2.5-1.3 0-1.9-.7-3.1-.7s-1.8.7-3.1.7c-1.8 0-3-1-3-2.5 0-1.6 1.6-2.8 1.9-4.2.3-1.2-.3-2.3-.3-3.8C8.2 7.4 9 6.3 9 4.5z"/><circle cx="10.5" cy="7" r=".6" fill="currentColor"/><circle cx="13.5" cy="7" r=".6" fill="currentColor"/></symbol>
  <symbol id="i-phone" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2.5"/><path d="M11 18h2"/></symbol>
  <symbol id="i-medal" viewBox="0 0 24 24"><circle cx="12" cy="14" r="6"/><path d="M8.5 8 6 3M15.5 8 18 3M9 3h6M12 12v4M10.4 13.5l3.2 1"/></symbol>
</svg>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg class="ic"><use href="#i-kb"></use></svg></div>
      <div>
        <h1>คีย์<span>เควสต์</span></h1>
        <p>เกมฝึกพิมพ์ดีด · ไทย & อังกฤษ · สุ่มโจทย์ใหม่ทุกครั้ง</p>
      </div>
    </div>
    <div class="head-right">
      <button class="icon-btn" id="btnSound" title="เปิด/ปิดเสียงพิมพ์"><svg class="ic"><use href="#i-vol"></use></svg></button>
      <button class="icon-btn" id="btnMusic" title="เปิด/ปิดเพลงประกอบ"><svg class="ic"><use href="#i-music"></use></svg></button>
      <div class="lang-toggle">
        <button id="btnTH" class="active"><svg class="ic"><use href="#i-globe"></use></svg> ไทย</button>
        <button id="btnEN"><svg class="ic"><use href="#i-globe"></use></svg> EN</button>
      </div>
    </div>
  </header>

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="profile-avatar-wrapper">
      <div class="profile-avatar-large" id="profileAvatarLarge">🦊</div>
      <div class="profile-avatar-edit-btn" id="btnEditAvatar"><svg class="ic"><use href="#i-check"></use></svg></div>
    </div>

    <h2 id="profileUsernameLarge">ผู้ใช้ทั่วไป</h2>
    <p style="color:var(--muted);font-size:12.5px;margin-bottom:18px" id="profileUserEmail">โหมดเล่นออฟไลน์</p>

    <!-- Avatar Selector -->
    <div class="avatar-selector-panel" id="avatarSelectorPanel" style="display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px" id="lblSelectGuardian">เลือกผู้พิทักษ์ของคุณ</div>
      <div class="avatar-bubbles">
        <div class="avatar-bubble" onclick="changeAvatar('🦊')">🦊</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐱')">🐱</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐼')">🐼</div>
        <div class="avatar-bubble" onclick="changeAvatar('🦄')">🦄</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐲')">🐲</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐧')">🐧</div>
        <div class="avatar-bubble" onclick="changeAvatar('🦁')">🦁</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐸')">🐸</div>
        <div class="avatar-bubble" onclick="changeAvatar('🦉')">🦉</div>
        <div class="avatar-bubble" onclick="changeAvatar('🐬')">🐬</div>
        <div class="avatar-bubble" onclick="changeAvatar('🦋')">🦋</div>
        <div class="avatar-bubble" onclick="changeAvatar('🤖')">🤖</div>
        <div class="avatar-bubble" onclick="changeAvatar('👾')">👾</div>
        <div class="avatar-bubble" onclick="changeAvatar('🎮')">🎮</div>
        <div class="avatar-bubble" onclick="changeAvatar('⭐')">⭐</div>
        <div class="avatar-bubble" onclick="changeAvatar('🔥')">🔥</div>
      </div>
    </div>

    <!-- Level Section -->
    <div class="profile-level-section">
      <div class="profile-level-header">
        <span class="lvl-badge" id="profileLvlBadge">Lv. 1</span>
        <span class="xp-text" id="profileXpText">XP: 0/200</span>
      </div>
      <div class="profile-xp-bar-container">
        <div class="profile-xp-bar-fill" id="profileXpBarFill"></div>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="profile-stats-grid">
      <div class="stat-box">
        <span class="stat-val" id="profStatGames">0</span>
        <span class="stat-lbl"><svg class="ic"><use href="#i-trophy"></use></svg> <span id="lblProfGames">ด่านที่พิมพ์</span></span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="profStatWpm">0</span>
        <span class="stat-lbl"><svg class="ic"><use href="#i-gauge"></use></svg> <span id="lblProfWpm">WPM สูงสุด</span></span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="profStatAcc">0%</span>
        <span class="stat-lbl"><svg class="ic"><use href="#i-target"></use></svg> <span id="lblProfAcc">แม่นยำเฉลี่ย</span></span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="profStatGold">0</span>
        <span class="stat-lbl"><svg class="ic"><use href="#i-star"></use></svg> <span id="lblProfGold">ทองสะสม</span></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <button class="btn btn-amber" id="btnStartQuest"><svg class="ic"><use href="#i-next"></use></svg> <span id="lblStartQuest">เข้าสู่การเลือกด่าน (Start Quest)</span></button>
      <button class="btn btn-ghost" id="btnProfileAcademy"><svg class="ic"><use href="#i-bolt"></use></svg> <span id="lblProfAcademy">สำนักฝึกวิชา (Academy)</span></button>
      <button class="btn btn-ghost" id="btnProfileLogout" style="color:var(--coral)"><svg class="ic"><use href="#i-logout"></use></svg> <span id="lblProfLogout">ออกจากระบบ</span></button>
    </div>
  </div>

  <div class="footer-note" id="footerNote"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/profile.js"></script>
<script>bootProfile();</script>
</body>
</html>
